<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordScramble</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="words.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h2>Word Scramble</h2>
        <div class="content">
            <div class="word-area">
                <h1 id="word">TEXPRE</h1>
            </div>
            <div class="hint-area">
                <p id="hint">Hint: Person other than a family member</p>
            </div>
            <div class="time-area">
                <p>Time Left: <span id="timer">30</span>s</p>
            </div>
            <input type="text" spellcheck="false" placeholder="Enter a valid word" id="input">
            <div class="buttons">
                <div class="refresh" id="refresh">
                    <p>Refresh Word</p>
                </div>
                <div class="check" id="check">
                    <p>Check Word</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
